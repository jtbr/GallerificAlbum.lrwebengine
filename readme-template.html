<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$pagetitle$</title>
<style>
  html{font-size:16px;-webkit-text-size-adjust:100%;}
  body{max-width:760px;margin:2.5rem auto;padding:0 1.2rem;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65;color:#24292f;background:#fff;}
  h1,h2,h3,h4,h5{line-height:1.25;margin-top:1.7em;margin-bottom:.6em;font-weight:600;}
  h1{font-size:1.95rem;border-bottom:1px solid #e2e8ee;padding-bottom:.3em;margin-top:0;}
  h2{font-size:1.45rem;border-bottom:1px solid #eef1f4;padding-bottom:.25em;}
  h3{font-size:1.18rem;}
  h4,h5{font-size:1rem;color:#475059;}
  p{margin:0 0 1em;}
  a{color:#0977bc;text-decoration:none;}
  a:hover{text-decoration:underline;}
  code{background:#f4f7fa;padding:.15em .35em;border-radius:4px;font-size:.9em;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  pre{background:#f4f7fa;padding:1rem;border-radius:6px;overflow:auto;border:1px solid #e2e8ee;line-height:1.45;}
  pre code{background:none;padding:0;font-size:.88em;}
  ul,ol{padding-left:1.5em;}
  li{margin:.35em 0;}
  li>ul,li>ol{margin:.35em 0;}
  blockquote{margin:0 0 1em;padding:.2em 1em;color:#5b6670;border-left:4px solid #d7dee6;}
  img{max-width:100%;height:auto;}
  hr{border:none;border-top:1px solid #e2e8ee;margin:2.2em 0;}
</style>
</head>
<body>
$body$
</body>
</html>
